services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-open_design_canvas}
      POSTGRES_USER: ${POSTGRES_USER:-odc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odc_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - odc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odc} -d ${POSTGRES_DB:-open_design_canvas}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - odc_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-odc_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-odc_minio_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - odc_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-odc_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-odc_minio_password}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-odc-artifacts}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${OBJECT_STORAGE_BUCKET}"
        mc anonymous set none "local/$${OBJECT_STORAGE_BUCKET}"

volumes:
  odc_postgres_data:
  odc_redis_data:
  odc_minio_data:
